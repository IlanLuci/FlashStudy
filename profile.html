<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Flash Study</title>
        
        <link rel="icon" type="image/x-icon" href="favicon.png">
        <link rel="preconnect" href="https://api.flashstudy.org" crossorigin>
        <link rel="preload" href="6xK3dSBYKcSV-LCoeQqfX1RYOo3qOK7lujVj9w.woff2" as="font" type="font/woff2" crossorigin>
        <link rel="stylesheet" href="main.css?12">
        <style>
            button {
                position: relative;
                bottom: 10px;
            }
          
            .delete:hover {
                background-color: #c25f46;
            }

            #logout {
                float: right;
                margin-top: 20px;
                margin-right: 8px;
            }
            #logout:hover {
                background-color: #c25f46;
            }
            #create-set {
                float: right;
                margin-right: 15px;
                margin-top: -40px;
            }
            #create-note {
                float: right;
                margin-right: 15px;
                margin-top: -40px;
            }

            #sets-container {
                padding: 5px;
            }
            #notes-container {
                padding: 5px;
            }

            .set {
                width: calc(25% - 41px);
                margin: 10px;
                padding: 8px;
                display: inline-block;
                border: var(--content-border);
                padding-bottom: 10px;
                text-align: center;
            }
            .set-heading {
                font-size: 15pt;
                overflow-x: hidden;
                text-wrap: nowrap;
            }
            .set-description {
                margin: 10px 0 0 0;
            }
            .set button {
                margin: 3px;
            }

            .heading {
                border: var(--content-border);
                margin: 40px 15px 15px 15px;
                padding: 0px 0px 0px 20px;
                font-size: 15pt;
            }

            .note {
                display: inline-block;
                border: var(--content-border);
                text-align: center;
                width: calc(25% - 41px);
                margin-bottom: 20px;
                margin: 10px;
                padding: 8px;
                padding-bottom: 10px;
            }
            .note-heading {
                font-size: 15pt;
                margin: 5px 0 15px 0;
                overflow-x: hidden;
                text-wrap: nowrap;
            }
            .note button {
                margin: 3px;
            }

            #messages {
                position: absolute;
                color: #2eb351;
                left: 50%;
                transform: translate(-50%);
                top: 50px;
                font-size: 13pt;
            }
            @media (max-width: 1000px) {
                .set {
                    width: calc(50% - 41px);
                }
                .note {
                    width: calc(50% - 41px);
                }
            }
            @media (max-width: 500px) {
                .set {
                    width: calc(100% - 41px);
                }
                .note {
                    width: calc(100% - 41px);
                }
            }
            #title {
                overflow: hidden;
                width: calc(100vw - 130px);
                white-space: nowrap;
            }
            @media (max-width: 600px) {
                #title {
                    font-size: 14pt;
                    margin-top: 15px;
                    white-space: nowrap !important;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <svg onclick="location.href = 'index.html'" id="back" xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-arrow-left-short" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5"/>
            </svg>
    
            <h1 id="title">Profile</h1>

            <button id="logout" onclick="logout();">Logout</button>
        </header>
        
        <p id="messages"></p>

        <div class="heading" style="margin-top: 100px;">
            <p>Flash Sets</p>
            <button id="create-set" onclick="location.href = 'create-set.html'">Create New Flash Set</button>
        </div>
        <div id="sets-container"></div>

        <div class="heading">
            <p>Flash Notes</p>
            <button id="create-note" onclick="location.href = 'create-note.html'">Create New Flash Note</button>
        </div>
        <div id="notes-container"></div>

        <script src="main.js?v2"></script>
        <script>
            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
            }

            window.addEventListener('load', async () => {
                const response = await fetcher(`/auth/profile`);
                if (!response) return;

                if (response.status === 403 || response.status === 401) {
                    alert('You must be logged in to access this.');
                    location.assign('/login.html');
                    return;
                }
                if (response.status !== 200) {
                    alert('Failed to load profile.');
                    return;
                }

                const setContainer = document.getElementById('sets-container');
                const noteContainer = document.getElementById('notes-container');
                const json = await response.json();

                document.getElementById('title').innerText = `${json.username}'s Profile`;

                const setsRev = json.sets.slice().reverse();
                const notesRev = json.notes.slice().reverse();

                const setHtml = setsRev.map(s => `<div class="set">
                    <p class="set-heading">${escapeHtml(s.name)}</p>
                    <p class="set-description">${s.questions_count} questions</p>
                    <p class="set-description">${s.completions || 0} completions</p>
                    <br>
                    <button style="margin-top: 12px;" onclick="location.assign('view-set.html?id=${encodeURIComponent(s.id)}');">View</button>
                    <button onclick="deleteSet('${String(s.id).replace(/'/g, "\\'")}');" class="delete">Delete</button>
                </div>`).join('');

                setContainer.innerHTML = setHtml || '<p style="text-align: center">You have not created any sets yet.</p>';

                if (notesRev.length === 0) {
                    noteContainer.innerHTML = '<p style="text-align: center">You have not created any notes yet.</p>';
                } else {
                    const noteFrag = document.createDocumentFragment();
                    for (const n of notesRev) {
                        const noteEle = document.createElement('div');
                        noteEle.className = 'note';
                        const noteHeading = document.createElement('p');
                        noteHeading.className = 'note-heading';
                        noteHeading.innerText = n.title;
                        const deleteButton = document.createElement('button');
                        deleteButton.innerText = 'Delete';
                        deleteButton.className = 'delete';
                        deleteButton.addEventListener('click', () => deleteNote(n.id));
                        const viewButton = document.createElement('button');
                        viewButton.innerText = 'View';
                        viewButton.style.marginTop = '12px';
                        viewButton.addEventListener('click', () => location.assign(`note.html?id=${n.id}`));
                        noteEle.appendChild(noteHeading);
                        noteEle.appendChild(viewButton);
                        noteEle.appendChild(deleteButton);
                        noteFrag.appendChild(noteEle);
                    }
                    noteContainer.appendChild(noteFrag);
                }
            });

            async function deleteSet(id) {
                if (confirm('Are you sure you want to delete this flash set?')) {
                    let res = await fetcher(`/sets/delete`, { method: 'post', body: JSON.stringify({ id: id }), headers: { 'Content-Type': 'application/json' }});

                    if (res.status == 201) {
                        // set deleted succesfully
                        document.getElementById('messages').innerText = 'set successfully deleted';

                        setTimeout(() => {
                            location.reload();
                        }, 500);
                    } else {
                        //failed to delete set
                        let text = await res.text();

                        document.getElementById('messages').innerText = text;
                    }
                }
            }

            async function deleteNote(id) {
                if (confirm('Are you sure you want to delete this flash note?')) {
                    let res = await fetcher(`/notes/delete`, { method: 'post', body: JSON.stringify({ id: id }), headers: { 'Content-Type': 'application/json' }});

                    if (res.status == 201) {
                        // set deleted succesfully
                        document.getElementById('messages').innerText = 'note successfully deleted';

                        setTimeout(() => {
                            location.reload();
                        }, 500);
                    } else {
                        //failed to delete note
                        let text = await res.text();

                        document.getElementById('messages').innerText = text;
                    }
                }
            }
        </script>
    </body>
</html>
